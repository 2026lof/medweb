<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harbor Medical Office</title>
  <style>
    :root {
      --bg: #f6fbff;
      --card: #ffffff;
      --text: #163047;
      --muted: #5f7488;
      --primary: #1b6ca8;
      --primary-dark: #14527f;
      --accent: #dff2ff;
      --border: #d7e4ef;
      --shadow: 0 18px 45px rgba(18, 64, 99, 0.12);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef7fd 0%, #ffffff 32%, #f7fbfe 100%);
      color: var(--text);
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      background: #11324a;
      color: #eaf6ff;
      font-size: 14px;
    }

    .topbar-inner {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 0;
      flex-wrap: wrap;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(215, 228, 239, 0.75);
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 0;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 20px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--primary), #55a9df);
      display: grid;
      place-items: center;
      color: white;
      font-size: 20px;
      box-shadow: var(--shadow);
    }

    .nav-links {
      display: flex;
      gap: 22px;
      color: var(--muted);
      font-size: 15px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 999px;
      font-weight: 700;
      transition: 0.2s ease;
      border: 0;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: white;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .hero {
      padding: 72px 0 36px;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 28px;
      align-items: stretch;
    }

    .hero-copy,
    .hero-card,
    .service-card,
    .doctor-card,
    .info-card,
    .contact-card,
    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero-copy {
      padding: 46px;
      background:
        radial-gradient(circle at top right, rgba(27,108,168,0.14), transparent 32%),
        linear-gradient(180deg, #ffffff 0%, #f7fbff 100%);
    }

    .eyebrow {
      display: inline-block;
      padding: 8px 12px;
      background: var(--accent);
      color: var(--primary-dark);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1, h2, h3 { margin: 0 0 14px; line-height: 1.15; }
    h1 { font-size: clamp(34px, 5vw, 56px); }
    h2 { font-size: clamp(28px, 4vw, 38px); }
    h3 { font-size: 22px; }

    p { margin: 0 0 16px; color: var(--muted); }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 28px;
    }

    .hero-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 34px;
    }

      padding: 18px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid
